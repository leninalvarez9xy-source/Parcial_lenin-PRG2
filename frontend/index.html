<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

```
<style>

    body{
        font-family: Arial;
        background: #f2f2f2;
    }

    .contenedor{
        width: 300px;
        background: white;
        padding: 20px;
        margin: 100px auto;
        border: 1px solid #ccc;
    }

    h2{
        text-align: center;
    }

    label{
        display: block;
        margin-top: 10px;
    }

    input{
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        box-sizing: border-box;
    }

    button{
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        cursor: pointer;
    }

    #mensaje{
        text-align: center;
        margin-top: 10px;
    }

</style>
```

</head>
<body>

```
<div class="contenedor">

    <h2>Iniciar Sesión</h2>

    <form id="loginForm">

        <label>Usuario</label>
        <input type="text" id="usuario" required>

        <label>Contraseña</label>
        <input type="password" id="password" required>

        <button type="submit">Ingresar</button>

    </form>

    <p id="mensaje"></p>

</div>

<script src="app.js"></script>
```

</body>
</html>
