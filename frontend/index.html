<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Acceso</title>

```
<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg,#1e3c72,#2a5298);
    }

    .contenedor{
        background:white;
        width:350px;
        padding:35px;
        border-radius:15px;
        box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        margin-bottom:10px;
        color:#1e3c72;
    }

    p{
        text-align:center;
        margin-bottom:25px;
        color:gray;
    }

    .grupo{
        margin-bottom:18px;
    }

    label{
        display:block;
        margin-bottom:6px;
        font-weight:bold;
    }

    input{
        width:100%;
        padding:12px;
        border-radius:8px;
        border:1px solid #ccc;
        outline:none;
    }

    input:focus{
        border-color:#2a5298;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:8px;
        background:#1e3c72;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#16325c;
    }

    #mensaje{
        margin-top:15px;
        text-align:center;
        font-weight:bold;
    }

</style>
```

</head>
<body>

```
<div class="contenedor">

    <h1>Bienvenido</h1>
    <p>Ingrese sus datos para continuar</p>

    <form id="loginForm">

        <div class="grupo">
            <label>Usuario</label>
            <input type="text" id="usuario" required>
        </div>

        <div class="grupo">
            <label>Contraseña</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit">Entrar</button>

    </form>

    <p id="mensaje"></p>

</div>

<script src="app.js"></script>
```

</body>
</html>
